<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    Destroyer — top-down view, bow pointing RIGHT
    Key features: NARROW/SLIM hull (half the width of battleship),
    ONE prominent forward gun, small superstructure, torpedo tubes
    Should read as fast/light vs battleship's heavy bulk
  -->

  <!-- Water shadow -->
  <ellipse cx="32" cy="58" rx="20" ry="3.5" fill="rgba(0,0,50,0.3)"/>
  <!-- Bow wake -->
  <path d="M54,36 Q60,38 58,44" stroke="#7090b0" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- === HULL — long and narrow === -->
  <!-- Hull bottom (waterline, narrow) -->
  <polygon points="8,48 54,48 60,42 54,36 8,36 6,42" fill="#1a2030"/>
  <!-- Main deck — narrow! Only ~12px tall at widest -->
  <polygon points="8,45 54,45 60,41 54,37 8,37 6,41" fill="#5a6070"/>
  <!-- Bow — sharp, pointed -->
  <polygon points="54,37 60,41 54,45" fill="#4a5060"/>
  <!-- Stern — flat -->
  <polygon points="8,37 6,41 8,45" fill="#2a3040"/>
  <!-- Deck highlight -->
  <line x1="8" y1="38" x2="54" y2="38" stroke="#7080a0" stroke-width="1" opacity="0.4"/>

  <!-- === ONE FORWARD GUN (the key distinguishing feature) === -->
  <ellipse cx="46" cy="41" rx="5.5" ry="3.5" fill="#6a7080"/>
  <ellipse cx="46" cy="41" rx="3.5" ry="2.2" fill="#7a8090"/>
  <!-- Single gun barrel — prominent -->
  <rect x="50" y="40" width="12" height="2" rx="1" fill="#2a3040"/>

  <!-- === BRIDGE/SUPERSTRUCTURE — small, compact === -->
  <rect x="26" y="31" width="14" height="9" rx="1" fill="#6a7080"/>
  <rect x="26" y="31" width="3"  height="9" fill="#4a5060"/>
  <!-- Wheelhouse top -->
  <rect x="28" y="27" width="10" height="6" rx="1" fill="#7a8090"/>
  <!-- Mast (tall, thin — fast ship feature) -->
  <line x1="33" y1="18" x2="33" y2="27" stroke="#3a4050" stroke-width="1.5"/>
  <!-- Radar dish -->
  <ellipse cx="33" cy="19" rx="4" ry="1.5" fill="#2a3040"/>

  <!-- Smokestack (single) -->
  <rect x="31" y="27" width="4" height="5" rx="1" fill="#2a2a2a"/>

  <!-- === TORPEDO TUBES (mid-ship — classic destroyer trait) === -->
  <!-- Tubes pointing left side of ship -->
  <rect x="22" y="37" width="8" height="1.5" rx="0.5" fill="#3a4050"/>
  <rect x="22" y="39" width="8" height="1.5" rx="0.5" fill="#3a4050"/>
  <rect x="22" y="41" width="8" height="1.5" rx="0.5" fill="#3a4050"/>

  <!-- Tubes pointing right side -->
  <rect x="22" y="44" width="8" height="1.5" rx="0.5" fill="#3a4050"/>
  <rect x="22" y="46" width="8" height="1.5" rx="0.5" fill="#3a4050"/>

  <!-- Depth charge rack (stern) -->
  <rect x="9" y="39" width="5" height="4" rx="1" fill="#3a4050"/>

  <!-- Aft gun (small, secondary) -->
  <ellipse cx="14" cy="41" rx="3.5" ry="2" fill="#6a7080"/>
  <rect x="4" y="40" width="8" height="1.5" rx="0.5" fill="#2a3040"/>
</svg>
