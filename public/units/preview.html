<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategic Domination — Unit Icons Preview</title>
<style>
  body { background: #1a1a2e; color: #ccc; font-family: sans-serif; padding: 32px; }
  h1 { color: #fff; margin-bottom: 8px; font-size: 1.4rem; }
  h2 { color: #8a9; margin: 28px 0 12px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
  .grid { display: flex; flex-wrap: wrap; gap: 24px; }
  .unit { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .unit img { width: 96px; height: 96px; image-rendering: crisp-edges; background: #0d1117; border-radius: 12px; border: 1px solid #333; padding: 8px; }
  .unit span { font-size: 0.78rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>
<h1>Strategic Domination — Unit Icons</h1>

<h2>🪖 Land Units</h2>
<div class="grid">
  <div class="unit"><img src="infantry.svg?v=2"><span>Infantry</span></div>
  <div class="unit"><img src="tank.svg?v=2"><span>Tank</span></div>
</div>

<h2>✈️ Air Units</h2>
<div class="grid">
  <div class="unit"><img src="fighter.svg?v=2"><span>Fighter</span></div>
  <div class="unit"><img src="bomber.svg?v=2"><span>Bomber</span></div>
</div>

<h2>⚓ Naval Units</h2>
<div class="grid">
  <div class="unit"><img src="destroyer.svg?v=2"><span>Destroyer</span></div>
  <div class="unit"><img src="submarine.svg?v=2"><span>Submarine</span></div>
  <div class="unit"><img src="transport.svg?v=2"><span>Transport</span></div>
  <div class="unit"><img src="carrier.svg?v=2"><span>Carrier</span></div>
  <div class="unit"><img src="battleship.svg?v=2"><span>Battleship</span></div>
</div>

<p style="margin-top:40px;font-size:0.75rem;color:#555">Reply with feedback and I'll refine before applying to the game.</p>
</body>
</html>
