<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Water/shadow -->
  <ellipse cx="32" cy="56" rx="22" ry="5" fill="rgba(0,0,50,0.35)"/>
  <!-- Ocean surface shimmer -->
  <ellipse cx="32" cy="46" rx="26" ry="6" fill="#2a4a6a" opacity="0.4"/>
  <!-- Hull - bottom face -->
  <polygon points="10,44 54,44 54,50 10,50" fill="#2a2a35"/>
  <!-- Hull - right side dark -->
  <polygon points="54,40 58,42 58,48 54,44" fill="#1a1a28"/>
  <!-- Hull - left side -->
  <polygon points="10,40 6,42 6,48 10,44" fill="#2a2a35"/>
  <!-- Main hull top face (cigar shape) -->
  <ellipse cx="32" cy="40" rx="24" ry="7" fill="#4a4a5e"/>
  <!-- Bow (front pointed end) -->
  <ellipse cx="54" cy="44" rx="4" ry="5" fill="#3a3a4e"/>
  <!-- Stern (back) -->
  <ellipse cx="10" cy="44" rx="4" ry="5" fill="#3a3a4e"/>
  <!-- Hull highlight stripe -->
  <ellipse cx="32" cy="38" rx="20" ry="3" fill="#5a5a72" opacity="0.6"/>
  <!-- Conning tower - side face (dark) -->
  <polygon points="28,24 32,24 32,38 28,38" fill="#2a2a38"/>
  <!-- Conning tower - front face -->
  <polygon points="32,24 36,24 36,38 32,38" fill="#3a3a4a"/>
  <!-- Conning tower - top -->
  <polygon points="28,24 36,24 38,28 30,28" fill="#5a5a6e"/>
  <!-- Periscope -->
  <rect x="31" y="14" width="2" height="12" fill="#2a2a38"/>
  <rect x="29" y="14" width="4" height="2" rx="1" fill="#3a3a48"/>
  <!-- Periscope eye -->
  <circle cx="32" cy="14" r="2" fill="#4a7090" opacity="0.8"/>
  <!-- Forward hydroplane -->
  <polygon points="48,42 56,38 58,40 50,44" fill="#3a3a4a"/>
  <!-- Aft hydroplane -->
  <polygon points="16,42 8,38 6,40 14,44" fill="#3a3a4a"/>
  <!-- Torpedo tube openings -->
  <circle cx="55" cy="43" r="1.5" fill="#1a1a25"/>
  <circle cx="55" cy="46" r="1.5" fill="#1a1a25"/>
  <!-- Deck gun -->
  <ellipse cx="40" cy="38" rx="3" ry="2" fill="#3a3a4a"/>
  <rect x="41" y="37" width="8" height="1.5" rx="0.5" fill="#2a2a38"/>
  <!-- Water line -->
  <ellipse cx="32" cy="45" rx="23" ry="2" fill="#2a4a6a" opacity="0.5"/>
  <!-- Hull number -->
  <rect x="24" y="41" width="6" height="2" rx="0.5" fill="#3a3a4e" opacity="0.5"/>
</svg>
