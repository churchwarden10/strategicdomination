<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="18" ry="5" fill="rgba(0,0,0,0.35)"/>
  <!-- Tracks - left side (dark) -->
  <rect x="8" y="38" width="48" height="10" rx="3" fill="#2a2a1a"/>
  <!-- Track detail links left -->
  <rect x="10" y="39" width="4" height="8" rx="1" fill="#1a1a0f"/>
  <rect x="16" y="39" width="4" height="8" rx="1" fill="#1a1a0f"/>
  <rect x="22" y="39" width="4" height="8" rx="1" fill="#1a1a0f"/>
  <rect x="28" y="39" width="4" height="8" rx="1" fill="#1a1a0f"/>
  <rect x="34" y="39" width="4" height="8" rx="1" fill="#1a1a0f"/>
  <rect x="40" y="39" width="4" height="8" rx="1" fill="#1a1a0f"/>
  <rect x="46" y="39" width="4" height="8" rx="1" fill="#1a1a0f"/>
  <!-- Road wheels -->
  <circle cx="14" cy="43" r="4" fill="#3a3a22"/>
  <circle cx="24" cy="43" r="4" fill="#3a3a22"/>
  <circle cx="34" cy="43" r="4" fill="#3a3a22"/>
  <circle cx="44" cy="43" r="4" fill="#3a3a22"/>
  <!-- Hull - top face (lighter olive) -->
  <polygon points="12,24 52,24 56,38 8,38" fill="#6b7a3e"/>
  <!-- Hull - front face -->
  <polygon points="52,24 56,38 56,44 52,30" fill="#4d5c30"/>
  <!-- Hull - left dark face -->
  <polygon points="8,24 12,24 12,38 8,38" fill="#3d4d22"/>
  <!-- Turret top -->
  <ellipse cx="32" cy="22" rx="14" ry="8" fill="#7a8a45"/>
  <!-- Turret left shadow -->
  <ellipse cx="28" cy="23" rx="6" ry="4" fill="#556030" opacity="0.5"/>
  <!-- Turret front face -->
  <polygon points="18,22 46,22 44,30 20,30" fill="#6b7a3e"/>
  <!-- Turret left face -->
  <polygon points="18,22 20,30 18,30 16,22" fill="#4d5c30"/>
  <!-- Gun barrel - top -->
  <rect x="44" y="20" width="18" height="4" rx="2" fill="#4a5530"/>
  <!-- Gun barrel - bottom face -->
  <polygon points="44,24 62,24 62,25 44,25" fill="#3a4525"/>
  <!-- Commander's hatch -->
  <ellipse cx="28" cy="20" rx="4" ry="2.5" fill="#4a5530"/>
  <!-- Machine gun -->
  <rect x="18" y="21" width="2" height="5" rx="1" fill="#2a2a1a"/>
  <!-- Hull highlight stripe -->
  <polygon points="15,24 50,24 50,26 15,26" fill="#7d8f4a" opacity="0.5"/>
  <!-- Star marking -->
  <text x="30" y="37" font-size="6" fill="#c8b432" text-anchor="middle" font-family="sans-serif">★</text>
</svg>
