<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    Transport ship — top-down view, bow pointing RIGHT
    Key features: wide boxy hull (cargo ship shape), prominent cargo holds,
    small superstructure aft, minimal armament
    Colors consistent with fleet palette (same dark navy hull, slate deck)
  -->

  <!-- Water shadow -->
  <ellipse cx="32" cy="58" rx="24" ry="5" fill="rgba(0,0,50,0.3)"/>
  <!-- Bow wake -->
  <path d="M54,32 Q62,38 60,46" stroke="#7090b0" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- === HULL — wide, blunt, boxy === -->
  <!-- Hull bottom -->
  <polygon points="8,52 54,52 60,42 54,28 8,28 4,42" fill="#1a2030"/>
  <!-- Main deck -->
  <polygon points="8,49 54,49 60,42 54,30 8,30 4,42" fill="#4a5060"/>
  <!-- Bow (blunter than warships) -->
  <polygon points="54,30 60,42 54,49" fill="#3a4050"/>
  <!-- Stern -->
  <polygon points="8,30 4,42 8,49" fill="#2a3040"/>
  <!-- Deck highlight -->
  <line x1="8" y1="31" x2="54" y2="31" stroke="#6a7080" stroke-width="1" opacity="0.4"/>

  <!-- === CARGO HOLDS (the defining feature — big open hatches) === -->
  <!-- Hold 1 (forward) -->
  <rect x="12" y="33" width="14" height="9" rx="1" fill="#3a4050"/>
  <rect x="13" y="34" width="12" height="7" rx="1" fill="#2a3040"/>
  <!-- Hold 1 hatch covers (wooden/metal planks) -->
  <line x1="13" y1="36" x2="25" y2="36" stroke="#4a5060" stroke-width="0.8"/>
  <line x1="13" y1="38" x2="25" y2="38" stroke="#4a5060" stroke-width="0.8"/>
  <line x1="13" y1="40" x2="25" y2="40" stroke="#4a5060" stroke-width="0.8"/>

  <!-- Hold 2 (mid-ship) -->
  <rect x="30" y="33" width="14" height="9" rx="1" fill="#3a4050"/>
  <rect x="31" y="34" width="12" height="7" rx="1" fill="#2a3040"/>
  <line x1="31" y1="36" x2="43" y2="36" stroke="#4a5060" stroke-width="0.8"/>
  <line x1="31" y1="38" x2="43" y2="38" stroke="#4a5060" stroke-width="0.8"/>
  <line x1="31" y1="40" x2="43" y2="40" stroke="#4a5060" stroke-width="0.8"/>

  <!-- Cargo crane/derrick between holds -->
  <circle cx="27" cy="37" r="2" fill="#5a6070"/>
  <line x1="27" y1="30" x2="27" y2="37" stroke="#3a4050" stroke-width="1.5"/>

  <!-- === SUPERSTRUCTURE (aft, small) === -->
  <rect x="44" y="24" width="10" height="10" rx="1" fill="#5a6070"/>
  <rect x="44" y="24" width="3"  height="10" fill="#3a4050"/>
  <!-- Bridge top -->
  <rect x="45" y="20" width="8" height="6" rx="1" fill="#6a7080"/>
  <!-- Mast -->
  <line x1="49" y1="12" x2="49" y2="20" stroke="#3a4050" stroke-width="1.5"/>
  <line x1="45" y1="14" x2="53" y2="14" stroke="#3a4050" stroke-width="1"/>
  <!-- Funnel -->
  <rect x="46" y="18" width="5" height="6" rx="1" fill="#2a2a2a"/>
  <ellipse cx="48" cy="18" rx="2.5" ry="1" fill="#1a1a1a"/>

  <!-- Lifeboat davits (transport has them on sides) -->
  <ellipse cx="12" cy="30" rx="3.5" ry="1.5" fill="#c8a040" opacity="0.85"/>
  <ellipse cx="52" cy="44" rx="3.5" ry="1.5" fill="#c8a040" opacity="0.85"/>

  <!-- Defensive gun (transport would have one) -->
  <ellipse cx="10" cy="39" rx="3" ry="2" fill="#5a6070"/>
  <rect x="4" y="38" width="7" height="1.5" rx="0.5" fill="#2a3040"/>
</svg>
